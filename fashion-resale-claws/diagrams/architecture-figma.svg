<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9ff"/>
      <stop offset="100%" stop-color="#eef0ff"/>
    </linearGradient>
    <linearGradient id="busGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="url(#bgGrad)" rx="20"/>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" font-size="28" font-weight="800" fill="#1e1b4b">Fashion Resale Claws — System Architecture</text>
  <text x="700" y="75" text-anchor="middle" font-size="14" fill="#6b7280">Team: Alex, Ze'ev, Quilee | Maritime + OpenClaw + Telegram</text>

  <!-- User -->
  <rect x="580" y="95" width="240" height="70" rx="35" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">👤 USER (Telegram)</text>
  <text x="700" y="148" text-anchor="middle" font-size="11" fill="#4aca80">Commands, Approvals, Reports</text>

  <!-- Arrow User to Comms -->
  <line x1="700" y1="165" x2="700" y2="195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <defs><marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#22c55e"/></marker></defs>

  <!-- Communication Claw (spans full width) -->
  <rect x="100" y="195" width="1200" height="90" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="230" font-size="20" fill="#065f46">🗣️</text>
  <text x="185" y="230" font-size="15" font-weight="700" fill="#065f46">COMMUNICATION CLAW</text>
  <text x="185" y="252" font-size="11" fill="#059669">Message Router | Alert System | Report Generator | Command Parser</text>
  <text x="185" y="272" font-size="10" fill="#6ee7b7">Telegram Bot: @fashionresale_comms_bot | Listens on all channels | Routes /commands to target claws</text>

  <!-- MVP badge -->
  <rect x="1180" y="210" width="50" height="22" rx="11" fill="#10b981"/>
  <text x="1205" y="225" text-anchor="middle" font-size="10" font-weight="700" fill="white">MVP</text>

  <!-- Message Bus -->
  <rect x="100" y="310" width="1200" height="40" rx="8" fill="url(#busGrad)" opacity="0.9"/>
  <text x="700" y="335" text-anchor="middle" font-size="12" font-weight="600" fill="white">TELEGRAM MESSAGE BUS — #team-chat | #research-scraper | #scraper-buyer | #buyer-seller | #status-log | #commands</text>

  <!-- Arrows from Comms to Bus -->
  <line x1="700" y1="285" x2="700" y2="310" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4"/>

  <!-- Pipeline Claws Row -->
  <!-- Research Claw -->
  <rect x="100" y="380" width="270" height="220" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="415" font-size="20">🔍</text>
  <text x="155" y="415" font-size="15" font-weight="700" fill="#9a3412">RESEARCH CLAW</text>
  <rect x="280" y="400" width="50" height="22" rx="11" fill="#f97316"/>
  <text x="305" y="415" text-anchor="middle" font-size="10" font-weight="700" fill="white">MVP</text>
  <text x="120" y="445" font-size="11" fill="#c2410c">Curate + Validate Items</text>
  <line x1="120" y1="455" x2="350" y2="455" stroke="#fed7aa" stroke-width="1"/>
  <text x="120" y="475" font-size="10" fill="#78716c">→ Receive manual item list (URLs)</text>
  <text x="120" y="492" font-size="10" fill="#78716c">→ Validate links (reject eBay)</text>
  <text x="120" y="509" font-size="10" fill="#78716c">→ Confirm color, size, options</text>
  <text x="120" y="526" font-size="10" fill="#78716c">→ Suggest alternatives</text>
  <text x="120" y="543" font-size="10" fill="#78716c">→ Output: item_list.json (max 10)</text>
  <text x="120" y="575" font-size="9" fill="#a8a29e">Bot: @fashionresale_research_bot</text>
  <text x="120" y="590" font-size="9" fill="#a8a29e">Tools: Web Search, HTTP Client</text>

  <!-- Arrow Research → Scraper -->
  <path d="M370,490 L410,490" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <defs><marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#f97316"/></marker></defs>
  <text x="390" y="483" text-anchor="middle" font-size="8" fill="#f97316" font-weight="600">JSON</text>

  <!-- Scraper Claw -->
  <rect x="410" y="380" width="270" height="220" rx="16" fill="#fefce8" stroke="#eab308" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="415" font-size="20">🕷️</text>
  <text x="465" y="415" font-size="15" font-weight="700" fill="#854d0e">SCRAPER CLAW</text>
  <rect x="590" y="400" width="50" height="22" rx="11" fill="#eab308"/>
  <text x="615" y="415" text-anchor="middle" font-size="10" font-weight="700" fill="white">MVP</text>
  <text x="430" y="445" font-size="11" fill="#a16207">Monitor Availability + Price</text>
  <line x1="430" y1="455" x2="660" y2="455" stroke="#fef08a" stroke-width="1"/>
  <text x="430" y="475" font-size="10" fill="#78716c">→ Check each URL (Playwright)</text>
  <text x="430" y="492" font-size="10" fill="#78716c">→ Extract price + availability</text>
  <text x="430" y="509" font-size="10" fill="#78716c">→ Take screenshot proof</text>
  <text x="430" y="526" font-size="10" fill="#78716c">→ Detect status changes</text>
  <text x="430" y="543" font-size="10" fill="#78716c">→ Output: available_items.json</text>
  <text x="430" y="575" font-size="9" fill="#a8a29e">Bot: @fashionresale_scraper_bot</text>
  <text x="430" y="590" font-size="9" fill="#a8a29e">Tools: Playwright, ScraperAPI, R2</text>

  <!-- Arrow Scraper → Buyer -->
  <path d="M680,490 L720,490" stroke="#eab308" stroke-width="2.5" marker-end="url(#arrowYellow)"/>
  <defs><marker id="arrowYellow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#eab308"/></marker></defs>
  <text x="700" y="483" text-anchor="middle" font-size="8" fill="#eab308" font-weight="600">JSON</text>

  <!-- Buyer Claw -->
  <rect x="720" y="380" width="270" height="220" rx="16" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="415" font-size="20">💰</text>
  <text x="775" y="415" font-size="15" font-weight="700" fill="#991b1b">BUYER CLAW</text>
  <rect x="880" y="400" width="70" height="22" rx="11" fill="#94a3b8"/>
  <text x="915" y="415" text-anchor="middle" font-size="10" font-weight="700" fill="white">Phase 2</text>
  <text x="740" y="445" font-size="11" fill="#dc2626">Purchase + Inventory</text>
  <line x1="740" y1="455" x2="970" y2="455" stroke="#fecaca" stroke-width="1"/>
  <text x="740" y="475" font-size="10" fill="#78716c">→ Get purchase approval</text>
  <text x="740" y="492" font-size="10" fill="#78716c">→ Execute checkout</text>
  <text x="740" y="509" font-size="10" fill="#78716c">→ Set shipping address</text>
  <text x="740" y="526" font-size="10" fill="#78716c">→ Record in inventory DB</text>
  <text x="740" y="543" font-size="10" fill="#78716c">→ Output: purchased_items.json</text>
  <text x="740" y="575" font-size="9" fill="#a8a29e">Tools: Playwright, Stripe, Supabase</text>

  <!-- Arrow Buyer → Seller -->
  <path d="M990,490 L1030,490" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <defs><marker id="arrowRed" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"/></marker></defs>
  <text x="1010" y="483" text-anchor="middle" font-size="8" fill="#ef4444" font-weight="600">JSON</text>

  <!-- Seller Claw -->
  <rect x="1030" y="380" width="270" height="220" rx="16" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="1060" y="415" font-size="20">📦</text>
  <text x="1085" y="415" font-size="15" font-weight="700" fill="#5b21b6">SELLER CLAW</text>
  <rect x="1190" y="400" width="70" height="22" rx="11" fill="#94a3b8"/>
  <text x="1225" y="415" text-anchor="middle" font-size="10" font-weight="700" fill="white">Phase 2</text>
  <text x="1050" y="445" font-size="11" fill="#7c3aed">List + Negotiate + Sell</text>
  <line x1="1050" y1="455" x2="1280" y2="455" stroke="#ddd6fe" stroke-width="1"/>
  <text x="1050" y="475" font-size="10" fill="#78716c">→ Calculate resale price</text>
  <text x="1050" y="492" font-size="10" fill="#78716c">→ Create Poshmark listing</text>
  <text x="1050" y="509" font-size="10" fill="#78716c">→ Monitor + respond to offers</text>
  <text x="1050" y="526" font-size="10" fill="#78716c">→ Coordinate shipping</text>
  <text x="1050" y="543" font-size="10" fill="#78716c">→ Track profit in DB</text>
  <text x="1050" y="575" font-size="9" fill="#a8a29e">Tools: PrimeLister, Poshmark, Supabase</text>

  <!-- Infrastructure Row -->
  <rect x="100" y="640" width="1200" height="100" rx="16" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6"/>
  <text x="130" y="670" font-size="13" font-weight="700" fill="#475569">INFRASTRUCTURE</text>

  <!-- Infra items -->
  <rect x="130" y="685" width="140" height="40" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="200" y="710" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Playwright</text>
  <text x="200" y="720" text-anchor="middle" font-size="8" fill="#94a3b8">Browser Automation</text>

  <rect x="290" y="685" width="140" height="40" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="360" y="710" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">ScraperAPI</text>
  <text x="360" y="720" text-anchor="middle" font-size="8" fill="#94a3b8">Proxy Rotation</text>

  <rect x="450" y="685" width="140" height="40" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="520" y="710" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Cloudflare R2</text>
  <text x="520" y="720" text-anchor="middle" font-size="8" fill="#94a3b8">Screenshot Storage</text>

  <rect x="610" y="685" width="140" height="40" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="680" y="710" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">SQLite/Supabase</text>
  <text x="680" y="720" text-anchor="middle" font-size="8" fill="#94a3b8">Inventory Database</text>

  <rect x="770" y="685" width="140" height="40" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="840" y="710" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Stripe</text>
  <text x="840" y="720" text-anchor="middle" font-size="8" fill="#94a3b8">Payments (Phase 2)</text>

  <rect x="930" y="685" width="140" height="40" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="1000" y="710" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Poshmark/PrimeLister</text>
  <text x="1000" y="720" text-anchor="middle" font-size="8" fill="#94a3b8">Listing (Phase 2)</text>

  <rect x="1090" y="685" width="140" height="40" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="1160" y="710" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">2Captcha</text>
  <text x="1160" y="720" text-anchor="middle" font-size="8" fill="#94a3b8">Anti-Bot (Phase 2)</text>

  <!-- Vertical arrows from claws to infra -->
  <line x1="545" y1="600" x2="545" y2="640" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3"/>
  <line x1="855" y1="600" x2="855" y2="640" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3"/>
  <line x1="1165" y1="600" x2="1165" y2="640" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3"/>

  <!-- Key/Legend -->
  <rect x="100" y="770" width="1200" height="55" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="130" y="795" font-size="11" font-weight="700" fill="#374151">KEY:</text>
  <rect x="180" y="782" width="12" height="12" rx="3" fill="#10b981"/> <text x="198" y="793" font-size="10" fill="#6b7280">Comms Claw</text>
  <rect x="290" y="782" width="12" height="12" rx="3" fill="#f97316"/> <text x="308" y="793" font-size="10" fill="#6b7280">Research Claw</text>
  <rect x="410" y="782" width="12" height="12" rx="3" fill="#eab308"/> <text x="428" y="793" font-size="10" fill="#6b7280">Scraper Claw</text>
  <rect x="530" y="782" width="12" height="12" rx="3" fill="#ef4444"/> <text x="548" y="793" font-size="10" fill="#6b7280">Buyer Claw</text>
  <rect x="630" y="782" width="12" height="12" rx="3" fill="#8b5cf6"/> <text x="648" y="793" font-size="10" fill="#6b7280">Seller Claw</text>
  <text x="770" y="793" font-size="10" fill="#6b7280">| Solid arrows = data handoff (JSON) | Dashed lines = infrastructure connections</text>
  <text x="130" y="815" font-size="10" fill="#9ca3af">Each claw = 1 Maritime agent + 1 Telegram bot + 1 OpenClaw workspace (SOUL.md + AGENTS.md) | MVP = Research + Scraper + Comms</text>
</svg>
